<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python ChatGPT Clone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="page-shell">
    <aside class="sidebar">
      <div class="brand-block">
        <p class="eyebrow">Python AI Workspace</p>
        <h1>ChatGPT Clone</h1>
        <p class="sidebar-copy">
          A lightweight chat app built with Python, browser-side state, and support for free local AI with Ollama.
        </p>
      </div>

      <div class="config-card">
        <label for="providerInput">Provider</label>
        <select id="providerInput">
          <option value="ollama">Ollama (Free local)</option>
          <option value="openrouter">OpenRouter</option>
          <option value="openai">OpenAI API</option>
        </select>

        <label for="modelInput">Model</label>
        <select id="modelInput"></select>

        <label for="systemPrompt">System Prompt</label>
        <textarea id="systemPrompt" rows="7">You are a helpful, friendly AI assistant in a ChatGPT-style web app. Be clear, concise, and practical.</textarea>

        <button id="newChatButton" class="secondary-button" type="button">Start New Chat</button>
      </div>
    </aside>

    <main class="chat-panel">
      <header class="chat-header">
        <div>
          <p class="eyebrow">Conversation</p>
          <h2>Ask anything</h2>
        </div>
        <div class="header-actions">
          <div id="statusPill" class="status-pill">Ready</div>
          <button id="copyChatButton" class="utility-button" type="button">Copy Chat</button>
          <button id="themeToggleButton" class="utility-button icon-button" type="button" aria-pressed="false" aria-label="Switch to dark mode" title="Switch theme">
            <span class="theme-icon theme-icon-sun" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <circle cx="12" cy="12" r="4.2"></circle>
                <path d="M12 1.8v3.1M12 19.1v3.1M4.82 4.82l2.2 2.2M16.98 16.98l2.2 2.2M1.8 12h3.1M19.1 12h3.1M4.82 19.18l2.2-2.2M16.98 7.02l2.2-2.2"></path>
              </svg>
            </span>
            <span class="theme-icon theme-icon-moon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M20.2 14.36A8.8 8.8 0 0 1 9.64 3.8a8.8 8.8 0 1 0 10.56 10.56Z"></path>
              </svg>
            </span>
            <span class="sr-only">Toggle theme</span>
          </button>
        </div>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>

      <form id="chatForm" class="composer">
        <textarea id="messageInput" rows="1" placeholder="Message the assistant..." required></textarea>
        <div class="composer-actions">
          <p class="composer-hint">Press Enter to send, Shift+Enter for a new line.</p>
          <button id="sendButton" type="submit">Send</button>
        </div>
      </form>
    </main>
  </div>

  <template id="messageTemplate">
    <article class="message">
      <div class="message-topline">
        <div class="message-role"></div>
        <button class="message-copy" type="button">Copy</button>
      </div>
      <div class="message-body"></div>
    </article>
  </template>

  <script src="/app.js"></script>
</body>
</html>
